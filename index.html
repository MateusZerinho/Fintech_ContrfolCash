<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCash - Login</title>
    <link rel="icon" href="../images/ControlCash_logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-12 col-md-6 col-lg-4">
                <div class="text-center mb-5">
                    <div class="logo-container mb-4">
                        <img src="images/ControlCash_logo.png" alt="Logo ControlCash" class="logo-image">
                    </div>
                    <h1 class="display-5 fw-bold mb-2">ControlCash</h1>
                    <p class="text-muted-custom">Administre suas finanças</p>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="mb-4">
                        <label for="email" class="form-label">Email</label>
                        <input 
                            type="email" 
                            class="form-control form-control-custom" 
                            id="email" 
                            placeholder="Digite seu e-mail"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label">Senha</label>
                        <input 
                            type="password" 
                            class="form-control form-control-custom" 
                            id="password" 
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary-custom w-100 mb-4">
                        Entrar
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted-custom small">
                        Não tem uma conta? 
                        <a href="pages/cadastro.html" class="text-decoration-none fw-semibold" style="color: var(--blue-primary);">Criar Conta</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
