<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCash - Metas Financeiras</title>
    <link rel="icon" href="../images/ControlCash_logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-start mb-4">
            <div>
                <h1 class="display-6 fw-bold mb-1">Metas Financeiras</h1>
                <p class="text-muted-custom small">Acompanhe o progresso dos seus objetivos</p>
            </div>
            <a href="configuracoes.html" class="btn btn-link text-decoration-none p-2" style="color: var(--blue-primary);">
                <i class="bi bi-gear fs-3"></i>
            </a>
        </div>

        <button class="btn btn-primary-custom w-100 mt-3" onclick="openAddGoalModal()">
            Adicionar Nova Meta
        </button>

        <!-- Container de Metas -->
        <div id="goalsContainer"></div>

    </div>

    <!-- Modal Adicionar Nova Meta -->
    <div class="modal fade" id="addGoalModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar Nova Meta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="newGoalName" class="form-label">Nome da Meta</label>
                        <input type="text" class="form-control form-control-custom" id="newGoalName" placeholder="Ex: Casa Própria">
                    </div>
                    <div class="mb-3">
                        <label for="newGoalTarget" class="form-label">Valor Alvo</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom ps-5" id="newGoalTarget" placeholder="0,00">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Escolha um Ícone</label>
                        <input type="hidden" id="newGoalIcon" value="💰">
                        <div id="newGoalEmojiPicker"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveNewGoal()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Editar Meta -->
    <div class="modal fade" id="editGoalModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Meta</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editGoalId">
                    <div class="mb-3">
                        <label for="editGoalName" class="form-label">Nome da Meta</label>
                        <input type="text" class="form-control form-control-custom" id="editGoalName">
                    </div>
                    <div class="mb-3">
                        <label for="editGoalCurrent" class="form-label">Valor Atual</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom ps-5" id="editGoalCurrent">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editGoalTarget" class="form-label">Valor Alvo</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom ps-5" id="editGoalTarget">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Escolha um Ícone</label>
                        <input type="hidden" id="editGoalIcon" value="💰">
                        <div id="editGoalEmojiPicker"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveEditGoal()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Adicionar Fundos -->
    <div class="modal fade" id="addFundsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Adicionar Fundos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="fundGoalId">
                    <div class="card-custom mb-3" style="background: rgba(30, 144, 255, 0.1);">
                        <p class="text-muted-custom small mb-1">Meta: <span id="fundGoalName"></span></p>
                        <p class="fw-semibold mb-0" id="fundGoalProgress"></p>
                    </div>
                    <div class="mb-3">
                        <label for="fundAmount" class="form-label">Valor a Adicionar</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom ps-5" id="fundAmount" placeholder="0,00">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveAddFunds()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Inferior -->
    <nav class="navbar-bottom">
        <div class="container">
            <div class="row w-100 g-0">
                <div class="col">
                    <a href="dashboard.html" class="nav-link active">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-house-door"></i>
                        </div>
                        <span>Início</span>
                    </a>
                </div>
                <div class="col">
                    <a href="renda.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>
                        <span>Renda</span>
                    </a>
                </div>
                <div class="col">
                    <a href="despesa.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-down-arrow"></i>
                        </div>
                        <span>Despesa</span>
                    </a>
                </div>
                <div class="col">
                    <a href="resumo.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-pie-chart"></i>
                        </div>
                        <span>Resumo</span>
                    </a>
                </div>
                <div class="col">
                    <a href="metas.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-bullseye"></i>
                        </div>
                        <span>Metas</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
