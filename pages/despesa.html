<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCash - Adicionar Despesa</title>
    <link rel="icon" href="../images/ControlCash_logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-6 fw-bold mb-0">Adicionar Despesa</h1>
            <a href="configuracoes.html" class="btn btn-link text-decoration-none p-2" style="color: var(--blue-primary);">
                <i class="bi bi-gear fs-3"></i>
            </a>
        </div>

        <form onsubmit="handleAddExpense(event)">
            <div class="mb-4">
                <label for="expenseValue" class="form-label">Valor</label>
                <div class="position-relative">
                    <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom fs-5">R$</span>
                    <input 
                        type="number" 
                        class="form-control form-control-custom ps-5" 
                        id="expenseValue" 
                        placeholder="0,00"
                        step="0.01"
                        required
                    >
                </div>
            </div>

            <div class="mb-4">
                <label for="expenseCategory" class="form-label">Categoria</label>
                <select class="form-select form-select-custom" id="expenseCategory" required>
                    <option value="">Selecionar categoria</option>
                    <option value="Comida">Comida</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Moradia">Moradia</option>
                    <option value="Entretenimento">Entretenimento</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="expensePayment" class="form-label">Método de Pagamento</label>
                <select class="form-select form-select-custom" id="expensePayment" required>
                    <option value="">Selecionar método</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Débito">Débito</option>
                    <option value="Pix">Pix</option>
                    <option value="Transferência">Transferência</option>
                </select>
            </div>

            <div class="mb-4">
                <label for="expenseDate" class="form-label">Data</label>
                <input 
                    type="date" 
                    class="form-control form-control-custom" 
                    id="expenseDate" 
                    required
                >
            </div>

            <div class="mb-4">
                <label class="form-label">Recibo (Opcional)</label>
                <input type="file" id="receiptInput" accept="image/*,.pdf" style="display: none;">
                <div class="upload-area" id="receiptUploadArea">
                    <i class="bi bi-cloud-upload fs-1 text-muted-custom"></i>
                    <p class="text-muted-custom small mt-2 mb-1">Clique ou arraste para fazer upload</p>
                    <p class="text-muted-custom small mb-0">JPG, PNG, GIF ou PDF (máx. 5MB)</p>
                </div>
                <div id="receiptPreview" style="display: none;"></div>
            </div>

            <button type="submit" class="btn btn-primary-custom w-100 mb-4">
                Adicionar Despesa
            </button>
        </form>

        <!-- Histórico de Despesas -->
        <div id="expenseHistory" class="mt-4"></div>
    </div>

    <!-- Modal Editar Despesa -->
    <div class="modal fade" id="editExpenseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Editar Despesa</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editExpenseId">
                    <div class="mb-3">
                        <label for="editExpenseValue" class="form-label">Valor</label>
                        <div class="position-relative">
                            <span class="position-absolute top-50 translate-middle-y ms-3 text-muted-custom">R$</span>
                            <input type="number" step="0.01" class="form-control form-control-custom ps-5" id="editExpenseValue">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="editExpenseCategory" class="form-label">Categoria</label>
                        <select class="form-select form-select-custom" id="editExpenseCategory">
                            <option value="Comida">Comida</option>
                            <option value="Transporte">Transporte</option>
                            <option value="Moradia">Moradia</option>
                            <option value="Entretenimento">Entretenimento</option>
                            <option value="Saúde">Saúde</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editExpensePayment" class="form-label">Método de Pagamento</label>
                        <select class="form-select form-select-custom" id="editExpensePayment">
                            <option value="Cartão de Crédito">Cartão de Crédito</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Débito">Débito</option>
                            <option value="Pix">Pix</option>
                            <option value="Transferência">Transferência</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="editExpenseDate" class="form-label">Data</label>
                        <input type="date" class="form-control form-control-custom" id="editExpenseDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-secondary-custom" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary-custom" onclick="saveEditExpense()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Menu Inferior -->
    <nav class="navbar-bottom">
        <div class="container">
            <div class="row w-100 g-0">
                <div class="col">
                    <a href="dashboard.html" class="nav-link active">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-house-door"></i>
                        </div>
                        <span>Início</span>
                    </a>
                </div>
                <div class="col">
                    <a href="renda.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>
                        <span>Renda</span>
                    </a>
                </div>
                <div class="col">
                    <a href="despesa.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-down-arrow"></i>
                        </div>
                        <span>Despesa</span>
                    </a>
                </div>
                <div class="col">
                    <a href="resumo.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-pie-chart"></i>
                        </div>
                        <span>Resumo</span>
                    </a>
                </div>
                <div class="col">
                    <a href="metas.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-bullseye"></i>
                        </div>
                        <span>Metas</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
