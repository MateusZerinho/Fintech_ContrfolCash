<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ControlCash - Início</title>
    <link rel="icon" href="../images/ControlCash_logo.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="container py-4">
        <!-- Cabeçalho -->
        <div class="mb-4 d-flex justify-content-between align-items-start">
            <div>
                <h1 class="display-6 fw-bold">Olá, <span id="userName">Usuario</span>!</h1>
                <p class="text-muted-custom">Bem-vindo de volta ao ControlCash</p>
            </div>
            <a href="configuracoes.html" class="btn btn-link text-decoration-none p-2" style="color: var(--blue-primary);">
                <i class="bi bi-gear fs-3"></i>
            </a>
        </div>

        <!-- Card de Saldo -->
        <div class="card-balance mb-4">
            <p class="mb-2 opacity-75 small">Saldo disponível</p>
            <h2 class="display-4 fw-bold mb-2" id="balance">R$ 0,00</h2>
            <p class="mb-0 opacity-75 small" id="balanceChange">Calculando...</p>
        </div>

        <!-- Ações Rápidas -->
        <div class="row g-3 mb-4">
            <div class="col-3">
                <a href="renda.html" class="quick-action income">
                    <i class="bi bi-graph-up-arrow"></i>
                    <div class="small fw-medium mt-2" style="color: var(--text-primary);">Renda</div>
                </a>
            </div>
            <div class="col-3">
                <a href="despesa.html" class="quick-action expense">
                    <i class="bi bi-graph-down-arrow"></i>
                    <div class="small fw-medium mt-2" style="color: var(--text-primary);">Despesa</div>
                </a>
            </div>
            <div class="col-3">
                <a href="resumo.html" class="quick-action summary">
                    <i class="bi bi-pie-chart"></i>
                    <div class="small fw-medium mt-2" style="color: var(--text-primary);">Resumo</div>
                </a>
            </div>
            <div class="col-3">
                <a href="metas.html" class="quick-action goals">
                    <i class="bi bi-bullseye"></i>
                    <div class="small fw-medium mt-2" style="color: var(--text-primary);">Metas</div>
                </a>
            </div>
        </div>

        <!-- Gráfico -->
        <div class="card-custom">
            <h3 class="h6 h5-md fw-semibold mb-3 mb-md-4">Tendências de gastos mensais</h3>
            <div class="chart-container" style="width: 100%; min-height: 200px;">
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>
    </div>

    <!-- Menu Inferior -->
    <nav class="navbar-bottom">
        <div class="container">
            <div class="row w-100 g-0">
                <div class="col">
                    <a href="dashboard.html" class="nav-link active">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-house-door"></i>
                        </div>
                        <span>Início</span>
                    </a>
                </div>
                <div class="col">
                    <a href="renda.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-up-arrow"></i>
                        </div>
                        <span>Renda</span>
                    </a>
                </div>
                <div class="col">
                    <a href="despesa.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-graph-down-arrow"></i>
                        </div>
                        <span>Despesa</span>
                    </a>
                </div>
                <div class="col">
                    <a href="resumo.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-pie-chart"></i>
                        </div>
                        <span>Resumo</span>
                    </a>
                </div>
                <div class="col">
                    <a href="metas.html" class="nav-link">
                        <div class="nav-icon-wrapper">
                            <i class="bi bi-bullseye"></i>
                        </div>
                        <span>Metas</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
